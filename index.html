<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도방 통합 대시보드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: #0f172a; color: #e2e8f0; min-height: 100vh;
       display: flex; flex-direction: column; align-items: center; justify-content: center; }
.logo { font-size: 48px; margin-bottom: 12px; }
h1 { font-size: 28px; font-weight: 800; color: #f1f5f9; margin-bottom: 6px; }
.sub { font-size: 14px; color: #64748b; margin-bottom: 48px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 860px; width: 100%; padding: 0 24px; }
@media(max-width: 600px) { .grid { grid-template-columns: 1fr; } }
.card { background: #1e293b; border-radius: 16px; padding: 28px 24px;
        text-decoration: none; color: inherit; border: 1px solid #334155;
        transition: all 0.2s; cursor: pointer; }
.card:hover { border-color: #3b82f6; transform: translateY(-2px);
              box-shadow: 0 8px 24px rgba(59,130,246,0.15); }
.card .icon { font-size: 36px; margin-bottom: 12px; }
.card h2 { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
.card p { font-size: 13px; color: #64748b; line-height: 1.5; }
.footer { margin-top: 48px; font-size: 12px; color: #334155; }
</style>
</head>
<body>
<div class="logo">🐷</div>
<h1>도방 통합 대시보드</h1>
<p class="sub">도방육종 · 도방에너지 · AI 하네스 실시간 현황</p>

<div class="grid">
  <a href="dashboard.html" class="card">
    <div class="icon">🐷</div>
    <h2>군별 현황</h2>
    <p>비육·자돈·인큐·특수군 두수 현황<br>이력조회 · 인쇄 지원</p>
  </a>
  <a href="deaths.html" class="card">
    <div class="icon">💀</div>
    <h2>폐사 · 백신 현황</h2>
    <p>일자별 폐사 비교 · 돈사별 누적<br>백신 접종 일정 관리 (사내 실시간)</p>
  </a>
  <a href="herd.html" class="card">
    <div class="icon">📊</div>
    <h2>군 관리</h2>
    <p>군번호별 두수 · 이동 이력<br>자돈·비육 현황 추적</p>
  </a>
  <a href="harness.html" class="card">
    <div class="icon">🔍</div>
    <h2>하네스 대시보드</h2>
    <p>AI 작업 실행 로그 · 서버별 성공률<br>에러 패턴 분석</p>
  </a>
</div>

<div class="footer">자동 업데이트 · 도방에너지 © 2026</div>
</body>
</html>
