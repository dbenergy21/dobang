<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도비 대화 — 도방 AI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: #0f172a; color: #e2e8f0; height: 100dvh;
       display: flex; flex-direction: column; }

.header { background: #1e293b; border-bottom: 1px solid #334155;
          padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.header a { color: #64748b; text-decoration: none; font-size: 18px; }
.header a:hover { color: #e2e8f0; }
.header h1 { font-size: 16px; font-weight: 700; color: #f1f5f9; }
.header .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }
.badge-claude  { background: #7c3aed; color: #fff; }
.badge-gemma   { background: #0369a1; color: #fff; }
.badge-check   { background: #334155; color: #94a3b8; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b;
              flex-shrink: 0; animation: pulse 2s infinite; }
.status-dot.online  { background: #22c55e; animation: none; }
.status-dot.offline { background: #ef4444; animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* 스플래시 (감지 중) */
.splash { flex: 1; display: flex; flex-direction: column; align-items: center;
          justify-content: center; gap: 16px; }
.splash .icon { font-size: 56px; }
.splash .msg  { font-size: 15px; color: #94a3b8; }
.splash .sub  { font-size: 12px; color: #475569; }
.spinner { width: 28px; height: 28px; border: 3px solid #334155;
           border-top-color: #7c3aed; border-radius: 50%;
           animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 외부 접속 안내 */
.offline-info { flex: 1; display: flex; flex-direction: column; align-items: center;
                justify-content: center; gap: 14px; padding: 24px; text-align: center; }
.offline-info .icon { font-size: 48px; }
.offline-info h2 { font-size: 18px; font-weight: 700; color: #f1f5f9; }
.offline-info p  { font-size: 13px; color: #64748b; line-height: 1.6; }
.offline-info .divider { width: 100%; border: none; border-top: 1px solid #1e293b; margin: 8px 0; }

/* Gemma4 폴백 채팅 */
.chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.messages  { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 14px;
       font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.msg.user   { align-self: flex-end; background: #3b82f6; color: #fff;
              border-radius: 14px 14px 4px 14px; }
.msg.bot    { align-self: flex-start; background: #1e293b; border: 1px solid #334155;
              border-radius: 14px 14px 14px 4px; }
.msg.bot.thinking { color: #64748b; font-style: italic; }
.msg.system { align-self: center; background: #172033; color: #7c86a2;
              font-size: 12px; border-radius: 8px; text-align: center; max-width: 95%; }

.quick-btns { padding: 6px 16px 0; display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
.qb { background: #1e293b; border: 1px solid #334155; border-radius: 14px;
      padding: 5px 12px; font-size: 12px; color: #94a3b8; cursor: pointer; }
.qb:hover { border-color: #3b82f6; color: #e2e8f0; }

.input-area { background: #1e293b; border-top: 1px solid #334155;
              padding: 12px 16px; display: flex; gap: 8px; flex-shrink: 0; }
.input-area input { flex: 1; background: #0f172a; border: 1px solid #334155;
                    border-radius: 22px; padding: 10px 16px; color: #e2e8f0;
                    font-size: 14px; outline: none; }
.input-area input:focus { border-color: #3b82f6; }
.input-area input::placeholder { color: #475569; }
.send-btn { background: #3b82f6; border: none; border-radius: 50%;
            width: 42px; height: 42px; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.send-btn:disabled { background: #334155; cursor: default; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <a href="index.html">←</a>
  <div class="status-dot" id="dot"></div>
  <h1>🤖 도비 대화</h1>
  <span id="mode-badge" class="badge badge-check">감지 중</span>
</div>

<!-- 감지 중 스플래시 -->
<div class="splash" id="splash">
  <div class="icon">🤖</div>
  <div class="spinner"></div>
  <div class="msg">네트워크 감지 중...</div>
  <div class="sub">사내 Wi-Fi → Claude 풀 버전<br>외부 → Gemma4 간편 버전</div>
</div>

<!-- 외부 접속 → Gemma4 폴백 채팅 -->
<div class="chat-wrap hidden" id="gemma-wrap">
  <div class="messages" id="messages">
    <div class="msg system">📡 외부 네트워크 — Gemma4 간편 모드<br>일정 저장 · 태스크 조회 · 간단 질문 가능</div>
  </div>
  <div class="quick-btns">
    <span class="qb" onclick="quickSend('이번주 마감 뭐야')">📋 이번주 마감</span>
    <span class="qb" onclick="quickSend('오늘 할일 뭐야')">✅ 오늘 할일</span>
    <span class="qb" onclick="quickSend('서버 상태 알려줘')">🖥 서버 상태</span>
    <span class="qb" onclick="quickSend('최신 보고서')">📊 보고서</span>
  </div>
  <div class="input-area">
    <input id="inp" type="text" placeholder="메시지 입력 (Enter 전송)..."
           onkeydown="if(event.key==='Enter'){event.preventDefault();sendGemma();}">
    <button class="send-btn" id="send-btn" onclick="sendGemma()">↑</button>
  </div>
</div>

<script>
const OPENCLAW_URL = 'http://192.168.0.13:18789';
const GEMMA_API    = 'http://192.168.0.13:5000/api/gemma';
const DETECT_MS    = 2500;

const splash    = document.getElementById('splash');
const gemmaWrap = document.getElementById('gemma-wrap');
const dot       = document.getElementById('dot');
const badge     = document.getElementById('mode-badge');

// ── 사내 LAN 감지 ──────────────────────────────────────────────
async function detectAndRoute() {
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), DETECT_MS);
    await fetch(OPENCLAW_URL + '/', { signal: ctrl.signal, mode: 'no-cors' });

    // ✅ 사내 LAN — OpenClaw 채팅으로 이동
    dot.classList.add('online');
    badge.textContent = 'Claude 연결';
    badge.className = 'badge badge-claude';
    splash.querySelector('.msg').textContent = 'Claude 도비에 연결됩니다...';
    splash.querySelector('.sub').textContent = OPENCLAW_URL + '/chat';
    setTimeout(() => { window.location.href = OPENCLAW_URL + '/chat'; }, 800);

  } catch(e) {
    // 외부 접속 → Gemma4 폴백
    dot.classList.add('offline');
    badge.textContent = 'Gemma4 모드';
    badge.className = 'badge badge-gemma';
    splash.classList.add('hidden');
    gemmaWrap.classList.remove('hidden');
  }
}

// ── Gemma4 폴백 채팅 ───────────────────────────────────────────
let sending = false;

function addMsg(text, cls) {
  const box = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  return d;
}

async function sendGemma() {
  if (sending) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  sending = true;
  document.getElementById('send-btn').disabled = true;

  addMsg(text, 'user');
  const thinking = addMsg('⏳ 처리 중...', 'bot thinking');

  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 70000);
    const r = await fetch(GEMMA_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
      signal: ctrl.signal
    });
    const data = await r.json();
    thinking.className = 'msg bot';
    thinking.textContent = data.reply || '[응답 없음]';
  } catch(e) {
    thinking.className = 'msg bot';
    thinking.textContent = e.name === 'AbortError'
      ? '⏱ 응답 시간 초과'
      : '⚠️ 연결 실패: ' + e.message;
  } finally {
    sending = false;
    document.getElementById('send-btn').disabled = false;
    inp.focus();
  }
}

function quickSend(text) {
  document.getElementById('inp').value = text;
  sendGemma();
}

// 시작
detectAndRoute();
</script>
</body>
</html>
