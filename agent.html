<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏢 도방 AI 컴퍼니 — 에이전트 대시보드</title>
<style>
  :root {
    --bg:#0d1117;--surface:#161b22;--surface2:#21262d;
    --border:#30363d;--text:#e6edf3;--muted:#8b949e;
    --green:#3fb950;--blue:#58a6ff;--yellow:#d29922;
    --red:#f85149;--purple:#bc8cff;--orange:#e3b341;
    --s1:#ff7b72;--s2:#ffa657;--s4:#79c0ff;--s3:#a5d6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-size:1.2rem;font-weight:700;}
  .logo span{color:var(--blue);}
  .header-right{display:flex;align-items:center;gap:16px;}
  #clock{font-size:.9rem;color:var(--muted);font-family:monospace;}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .container{max-width:1400px;margin:0 auto;padding:20px 24px;}
  .grid-top{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;}
  .grid-bottom{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media(max-width:900px){.grid-top,.grid-bottom{grid-template-columns:1fr;}}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .card-header{padding:14px 18px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;}
  .card-header h3{font-size:.95rem;font-weight:600;}
  .card-body{padding:16px 18px;}

  .agents-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}

  .agent-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
  .agent-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 20px rgba(88,166,255,.15);}
  .agent-card.selected{border-color:var(--blue);background:#1c2433;}
  .agent-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .agent-card[data-agent="서버1"]::before{background:var(--s1);}
  .agent-card[data-agent="서버2"]::before{background:var(--s2);}
  .agent-card[data-agent="서버3"]::before{background:var(--s3);}
  .agent-card[data-agent="서버4"]::before{background:var(--s4);}

  .agent-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .agent-name{display:flex;align-items:center;gap:8px;font-weight:600;}
  .agent-emoji{font-size:1.4rem;}

  .status-badge{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
  .status-badge.running{background:rgba(63,185,80,.2);color:var(--green);}
  .status-badge.idle{background:rgba(139,148,158,.2);color:var(--muted);}
  .status-badge.done{background:rgba(88,166,255,.2);color:var(--blue);}
  .status-badge.error{background:rgba(248,81,73,.2);color:var(--red);}
  .status-badge.offline{background:rgba(48,54,61,.5);color:var(--muted);}
  .status-badge.waiting{background:rgba(210,153,34,.2);color:var(--yellow);}

  .agent-task{font-size:.82rem;color:var(--muted);margin-bottom:10px;min-height:18px;}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:2px;transition:width .5s ease;
    background:linear-gradient(90deg,var(--blue),var(--purple));}
  .agent-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
  .loop-count,.updated{font-size:.72rem;color:var(--muted);}

  #detail-panel{display:none;}
  #detail-panel.visible{display:block;}

  .report-list{display:flex;flex-direction:column;gap:6px;}
  .report-item{background:var(--surface2);border-radius:6px;padding:8px 12px;
    font-size:.8rem;display:flex;justify-content:space-between;align-items:center;
    border-left:3px solid var(--border);cursor:pointer;}
  .report-item:hover{border-left-color:var(--blue);}

  #msg-feed{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;}
  .msg-item{display:flex;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;
    border-left:3px solid var(--border);animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .msg-item.alert{border-left-color:var(--red);}
  .msg-item.info{border-left-color:var(--blue);}
  .msg-item.request{border-left-color:var(--yellow);}
  .msg-arrow{color:var(--muted);font-size:.8rem;display:flex;flex-direction:column;align-items:center;gap:2px;padding-top:2px;}
  .msg-from{font-size:.72rem;font-weight:600;}
  .msg-to{font-size:.72rem;color:var(--muted);}
  .msg-content{flex:1;}
  .msg-subject{font-size:.85rem;font-weight:600;margin-bottom:3px;}
  .msg-body{font-size:.78rem;color:var(--muted);}
  .msg-time{font-size:.7rem;color:var(--muted);white-space:nowrap;}

  .obsidian-content{background:var(--bg);border:1px solid var(--border);border-radius:8px;
    padding:14px;font-size:.8rem;line-height:1.6;max-height:280px;overflow-y:auto;white-space:pre-wrap;}

  .quick-cmd{display:flex;flex-direction:column;gap:10px;}
  .cmd-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .cmd-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);
    padding:10px 14px;border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;text-align:left;}
  .cmd-btn:hover{border-color:var(--blue);background:#1c2433;}
  .cmd-btn-icon{margin-right:6px;}

  .section-label{font-size:.72rem;font-weight:600;text-transform:uppercase;
    letter-spacing:.8px;color:var(--muted);margin-bottom:10px;}

  .tabs{display:flex;gap:4px;margin-bottom:14px;}
  .tab{padding:6px 14px;border-radius:6px;font-size:.82rem;cursor:pointer;
    background:transparent;border:1px solid transparent;color:var(--muted);transition:all .2s;}
  .tab.active{background:var(--surface2);border-color:var(--border);color:var(--text);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  #alert-banner{display:none;background:rgba(248,81,73,.15);border:1px solid var(--red);
    border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:.85rem;color:var(--red);}

  input,select{width:100%;background:var(--surface2);border:1px solid var(--border);
    color:var(--text);padding:7px 10px;border-radius:6px;font-size:.82rem;outline:none;}
  input:focus,select:focus{border-color:var(--blue);}
  .send-btn{width:100%;background:var(--blue);border:none;color:#000;padding:9px;
    border-radius:6px;font-size:.85rem;font-weight:700;cursor:pointer;margin-top:4px;}
  .send-btn:hover{opacity:.85;}
</style>
</head>
<body>
<header>
  <div class="logo">🏢 도방 <span>AI 컴퍼니</span></div>
  <div class="header-right">
    <span id="api-badge" style="font-size:.72rem;color:var(--muted)">연결 중...</span>
    <span id="refresh-status" style="font-size:.72rem;color:var(--muted)"></span>
    <div class="pulse"></div>
    <span id="clock"></span>
  </div>
</header>

<div class="container">
  <div id="alert-banner"></div>

  <div class="grid-top">
    <!-- 왼쪽: 에이전트 + 상세 -->
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="card">
        <div class="card-header">
          <h3>🤖 에이전트 팀 현황</h3>
          <span style="font-size:.72rem;color:var(--muted)">클릭 → 상세보기</span>
        </div>
        <div class="card-body">
          <div class="agents-grid" id="agents-grid"></div>
        </div>
      </div>

      <div class="card" id="detail-panel">
        <div class="card-header">
          <div style="display:flex;align-items:center;gap:10px;">
            <span id="detail-emoji" style="font-size:1.8rem;"></span>
            <div>
              <h3 id="detail-name"></h3>
              <span id="detail-badge" class="status-badge"></span>
            </div>
          </div>
          <button onclick="closeDetail()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;">✕</button>
        </div>
        <div class="card-body">
          <div class="tabs">
            <div class="tab active" onclick="switchTab('reports')">📋 보고서</div>
            <div class="tab" onclick="switchTab('msgs')">💬 메시지</div>
          </div>
          <div id="tab-reports" class="tab-content active">
            <div class="section-label">최근 보고서</div>
            <div class="report-list" id="detail-reports"></div>
          </div>
          <div id="tab-msgs" class="tab-content">
            <div class="section-label">주고받은 메시지</div>
            <div id="detail-msgs" style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 메시지 피드 -->
    <div class="card">
      <div class="card-header">
        <h3>💬 에이전트 통신 피드</h3>
        <span id="msg-count" style="font-size:.72rem;color:var(--muted)"></span>
      </div>
      <div class="card-body" style="padding:12px;">
        <div id="msg-feed"></div>
      </div>
    </div>
  </div>

  <div class="grid-bottom">
    <!-- 옵시디언 -->
    <div class="card">
      <div class="card-header">
        <h3>🗂️ 옵시디언 종합현황</h3>
        <button onclick="loadObsidian()" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:.75rem;cursor:pointer;">새로고침</button>
      </div>
      <div class="card-body" style="padding:12px;">
        <div class="obsidian-content" id="obsidian-content">불러오는 중...</div>
      </div>
    </div>

    <!-- 빠른 명령 -->
    <div class="card">
      <div class="card-header"><h3>⚡ 빠른 명령 & 메시지</h3></div>
      <div class="card-body">
        <div class="quick-cmd">
          <div class="section-label">전체 팀</div>
          <div class="cmd-group">
            <button class="cmd-btn" onclick="broadcastCmd('📊 현황보고 요청','즉시 현황 보고 바람')">
              <span class="cmd-btn-icon">📊</span>전체 현황보고
            </button>
            <button class="cmd-btn" onclick="broadcastCmd('🔄 동기화 요청','옵시디언 동기화 즉시 실행')">
              <span class="cmd-btn-icon">🔄</span>전체 동기화
            </button>
          </div>
          <div class="section-label" style="margin-top:8px;">팀별</div>
          <div class="cmd-group">
            <button class="cmd-btn" onclick="sendCmd('서버1','🐷 폐사현황 보고 요청','즉시 폐사 현황 보고 바람')"><span class="cmd-btn-icon">🐷</span>육종팀 보고</button>
            <button class="cmd-btn" onclick="sendCmd('서버2','⚡ 경락가 확인','오늘 경락가 즉시 확인 바람')"><span class="cmd-btn-icon">⚡</span>에너지팀 보고</button>
            <button class="cmd-btn" onclick="sendCmd('서버4','📋 결제현황 확인','D-7 이내 결제 즉시 확인 바람')"><span class="cmd-btn-icon">📋</span>법무팀 보고</button>
            <button class="cmd-btn" onclick="sendCmd('서버3','🔗 노션동기화','obsidian_sync 즉시 실행')"><span class="cmd-btn-icon">🔗</span>노션 동기화</button>
          </div>
          <div class="section-label" style="margin-top:8px;">직접 메시지</div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <select id="msg-to">
              <option value="서버1">🐷 서버1 육종팀</option>
              <option value="서버2">⚡ 서버2 에너지팀</option>
              <option value="서버4">📋 서버4 법무팀</option>
              <option value="서버3">🧭 서버3 총괄</option>
            </select>
            <input id="msg-subj" placeholder="제목">
            <input id="msg-body" placeholder="내용 (선택)">
            <button class="send-btn" onclick="sendManual()">발송 →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── API URL 자동감지 ──────────────────────────────────────────
// LAN(서버3)에 연결되면 실시간, 아니면 GitHub 정적 JSON으로 폴백
const LAN_API = 'http://192.168.0.13:5001/api';
const GH_RAW  = 'https://raw.githubusercontent.com/dbenergy21/dobang/main';
let API = LAN_API;
let useGitHub = false;

async function detectAPI() {
  try {
    const ctrl = new AbortController();
    setTimeout(()=>ctrl.abort(), 3000);
    await fetch(`${LAN_API}/status`, {signal:ctrl.signal});
    API = LAN_API; useGitHub = false;
    document.getElementById('api-badge').textContent = '🟢 실시간 LAN';
    document.getElementById('api-badge').style.color = 'var(--green)';
  } catch {
    useGitHub = true;
    document.getElementById('api-badge').textContent = '🟡 GitHub 캐시';
    document.getElementById('api-badge').style.color = 'var(--yellow)';
  }
}

// GitHub 정적 JSON 폴백
async function fetchWithFallback(endpoint, ghFile) {
  if (!useGitHub) {
    try {
      const ctrl = new AbortController();
      setTimeout(()=>ctrl.abort(), 4000);
      const r = await fetch(`${API}${endpoint}`, {signal:ctrl.signal});
      return await r.json();
    } catch { useGitHub = true; }
  }
  const r = await fetch(`${GH_RAW}/${ghFile}?t=${Date.now()}`);
  return await r.json();
}

let selectedAgent=null,lastMsgCount=0,refreshN=0;
const AGENT_COLORS={'서버1':'var(--s1)','서버2':'var(--s2)','서버3':'var(--s3)','서버4':'var(--s4)'};
const STATUS_ICON={running:'🟢',idle:'⚪',done:'✅',error:'🔴',offline:'⬛',waiting:'🟡'};
const TEAM={'서버1':'육종팀','서버2':'에너지팀','서버3':'총괄팀','서버4':'법무팀'};

// 시계
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=
    `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}
setInterval(tick,1000);tick();

// 에이전트 카드 렌더링
function renderAgents(agents){
  const grid=document.getElementById('agents-grid');
  ['서버1','서버2','서버3','서버4'].forEach(name=>{
    const a=agents[name]||{status:'offline',task:'',progress:0,updated:'',loop_count:0,emoji:'🤖'};
    let card=document.querySelector(`.agent-card[data-agent="${name}"]`);
    if(!card){
      card=document.createElement('div');
      card.className='agent-card';
      card.setAttribute('data-agent',name);
      card.onclick=()=>selectAgent(name);
      grid.appendChild(card);
    }
    if(selectedAgent===name) card.classList.add('selected'); else card.classList.remove('selected');
    const prog=a.progress||0;
    const upd=(a.updated||'').substring(11,16)||'--:--';
    card.innerHTML=`
      <div class="agent-top">
        <div class="agent-name">
          <span class="agent-emoji">${a.emoji||'🤖'}</span>
          <div><div style="font-size:.92rem">${name}</div><div style="font-size:.7rem;color:var(--muted)">${TEAM[name]||''}</div></div>
        </div>
        <span class="status-badge ${a.status||'offline'}">${STATUS_ICON[a.status||'offline']||'⬜'} ${a.status||'offline'}</span>
      </div>
      <div class="agent-task">${a.task||'대기 중'}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
      <div class="agent-footer"><span class="loop-count">루프 ${a.loop_count||0}회</span><span class="updated">${upd}</span></div>
    `;
  });
  // 에러 배너
  const errs=Object.entries(agents).filter(([_,a])=>a.status==='error'&&['서버1','서버2','서버3','서버4'].includes(_)).map(([n])=>n);
  const b=document.getElementById('alert-banner');
  if(errs.length){b.style.display='block';b.textContent=`⚠️ 오류: ${errs.join(', ')} — 확인 필요`;}
  else{b.style.display='none';}
}

// 에이전트 선택
async function selectAgent(name){
  selectedAgent=name;
  document.getElementById('detail-panel').classList.add('visible');
  document.querySelectorAll('.agent-card').forEach(c=>c.classList.toggle('selected',c.getAttribute('data-agent')===name));
  try{
    const res=await fetch(`${API}/agent/${encodeURIComponent(name)}`);
    const d=await res.json();
    const s=d.status||{};
    document.getElementById('detail-emoji').textContent=s.emoji||'🤖';
    document.getElementById('detail-name').textContent=name+' — '+(TEAM[name]||'');
    const badge=document.getElementById('detail-badge');
    badge.textContent=`${STATUS_ICON[s.status||'offline']||''} ${s.status||'offline'}`;
    badge.className=`status-badge ${s.status||'offline'}`;
    // 보고서
    const rl=document.getElementById('detail-reports');rl.innerHTML='';
    (d.recent_reports||[]).forEach(r=>{
      const el=document.createElement('div');el.className='report-item';
      el.innerHTML=`<span>${r.name}</span><span style="color:var(--muted)">${r.time}</span>`;
      el.onclick=()=>alert(r.preview);
      rl.appendChild(el);
    });
    if(!(d.recent_reports||[]).length)rl.innerHTML='<div style="color:var(--muted);font-size:.82rem">보고서 없음</div>';
    // 메시지
    const ml=document.getElementById('detail-msgs');ml.innerHTML='';
    (d.messages||[]).forEach(m=>ml.appendChild(buildMsg(m)));
  }catch(e){console.error(e);}
}

function closeDetail(){
  selectedAgent=null;
  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelectorAll('.agent-card').forEach(c=>c.classList.remove('selected'));
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['reports','msgs'][i]===t));
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.toggle('active',el.id===`tab-${t}`));
}

// 메시지 빌더
function buildMsg(m){
  const el=document.createElement('div');
  el.className=`msg-item ${m.type||'info'}`;
  const time=(m.ts||'').substring(11,16);
  el.innerHTML=`
    <div class="msg-arrow">
      <div class="msg-from" style="color:${AGENT_COLORS[m.from]||'var(--muted)'}">${m.from||'?'}</div>
      <div style="font-size:.6rem">→</div>
      <div class="msg-to">${m.to||'전체'}</div>
    </div>
    <div class="msg-content">
      <div class="msg-subject">${m.subject||''}</div>
      ${m.body?`<div class="msg-body">${m.body.substring(0,80)}${m.body.length>80?'…':''}</div>`:''}
    </div>
    <div class="msg-time">${time}</div>`;
  return el;
}

// 메시지 피드
async function loadMessages(){
  try{
    const d=await fetchWithFallback('/messages?limit=30','messages.json');
    const msgs=d.messages||[];
    if(msgs.length!==lastMsgCount){
      const feed=document.getElementById('msg-feed');feed.innerHTML='';
      msgs.forEach(m=>feed.appendChild(buildMsg(m)));
      lastMsgCount=msgs.length;
      document.getElementById('msg-count').textContent=`${msgs.length}건`;
    }
  }catch(e){}
}

// 옵시디언
async function loadObsidian(){
  try{
    const res=await fetch(`${API}/obsidian/dashboard`);
    const d=await res.json();
    let html=(d.content||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/^# (.+)$/gm,'<span style="color:var(--blue);font-weight:700;font-size:1.05rem">$1</span>')
      .replace(/^## (.+)$/gm,'<span style="color:var(--purple);font-weight:600">$1</span>')
      .replace(/\*\*(.+?)\*\*/g,'<b style="color:var(--orange)">$1</b>')
      .replace(/🚨/g,'<span style="color:var(--red)">🚨</span>');
    document.getElementById('obsidian-content').innerHTML=html;
  }catch(e){document.getElementById('obsidian-content').textContent='로드 실패 (서버 연결 확인)';}
}

// 명령 함수
async function sendCmd(to,subject,body){
  await fetch(`${API}/send_message`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({from:'서버3',to,subject,body,type:'request'})});
  toast(`${to}에 명령: ${subject}`);
  setTimeout(loadMessages,600);
}
async function broadcastCmd(subject,body){
  await fetch(`${API}/broadcast`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({from:'서버3',subject,body})});
  toast(`전체 브로드캐스트: ${subject}`);
  setTimeout(loadMessages,600);
}
async function sendManual(){
  const to=document.getElementById('msg-to').value;
  const subj=document.getElementById('msg-subj').value.trim();
  const body=document.getElementById('msg-body').value.trim();
  if(!subj){alert('제목 입력 필요');return;}
  await sendCmd(to,subj,body);
  document.getElementById('msg-subj').value='';
  document.getElementById('msg-body').value='';
}

function toast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:10px;font-size:.85rem;z-index:999;animation:fadeIn .3s;';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

// 폴링 루프
async function refresh(){
  try{
    const d=await fetchWithFallback('/status','status.json');
    renderAgents(d.agents||{});
    refreshN++;
    const mode=useGitHub?'🟡GitHub':'🟢LAN';
    document.getElementById('refresh-status').textContent=`갱신 #${refreshN} ${mode}`;
  }catch(e){document.getElementById('refresh-status').textContent='⚠️오프라인';}
  await loadMessages();
  if(refreshN%6===1)await loadObsidian();
}
detectAPI().then(()=>{refresh();loadObsidian();});
setInterval(()=>detectAPI().then(refresh), 5000);
</script>
